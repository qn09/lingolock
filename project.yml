name: WordOfTheDay
options:
  bundleIdPrefix: com.language
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.28.1

targets:
  WordOfTheDay:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ios/WordOfTheDay
      - path: ios/Shared
    info:
      path: ios/WordOfTheDay/Info.plist
      properties:
        CFBundleDisplayName: LingoLock
        UILaunchScreen: {}
    dependencies:
      - target: WordOfTheDayWidget
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.language.wordoftheday
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: ios/WordOfTheDay/WordOfTheDay.entitlements

  WordOfTheDayWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ios/WordOfTheDayWidget
      - path: ios/Shared
    info:
      path: ios/WordOfTheDayWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.language.wordoftheday.widget
      TARGETED_DEVICE_FAMILY: "1"
      CODE_SIGN_ENTITLEMENTS: ios/WordOfTheDayWidget/WordOfTheDayWidget.entitlements
